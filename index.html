<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ailə Kainatı</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root {
    --bg: #05030c;
    --violet: #8b5cf6;
    --cyan: #22d3ee;
    --pink: #f472b6;
    --text: #f2eefc;
    --muted: #a89fc9;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    overflow-x: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: block;
}

.section {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.hero {
    text-align: center;
    z-index: 10;
}

.hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 900;
    background: linear-gradient(90deg, var(--violet), var(--cyan), var(--pink));
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 0 0 50px rgba(34, 211, 238, .3);
}

.scroll-text {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
    animation: float 2s infinite;
}

@keyframes float {
    0% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, 12px); }
    100% { transform: translate(-50%, 0); }
}

.planet-title {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron';
    font-size: 40px;
    font-weight: 800;
    text-shadow: 0 0 30px rgba(255, 255, 255, .3);
    z-index: 20;
}

.planet-desc {
    position: absolute;
    top: 140px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    color: var(--muted);
    z-index: 20;
}

.orbit-screen {
    position: relative;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.scene-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1500px;
    z-index: 5;
}

.orbit {
    position: relative;
    width: 1px;
    height: 1px;
    transform-style: preserve-3d;
    animation: spin 60s linear infinite;
}

@keyframes spin {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

.card {
    position: absolute;
    top: -46px;
    left: -72px;
    width: 145px;
    height: 92px;
    border-radius: 14px;
    background: linear-gradient(160deg, rgba(139, 92, 246, .18), rgba(34, 211, 238, .08));
    border: 1px solid rgba(255, 255, 255, .2);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: .35s;
}

.card:hover {
    transform: scale(1.1);
    border-color: var(--cyan);
    box-shadow: 0 0 30px rgba(34, 211, 238, .5), 0 0 70px rgba(139, 92, 246, .3);
}

.detail {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, .82);
    backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: .3s;
    z-index: 50;
}

.detail.show {
    opacity: 1;
    pointer-events: auto;
}

.detail-card {
    width: min(430px, 90vw);
    padding: 40px;
    border-radius: 25px;
    background: linear-gradient(160deg, rgba(139, 92, 246, .25), rgba(34, 211, 238, .08));
    text-align: center;
    border: 1px solid rgba(255, 255, 255, .2);
}

.avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-family: 'Orbitron';
    background: linear-gradient(160deg, var(--violet), var(--cyan));
    margin-bottom: 20px;
}

.close {
    margin-top: 25px;
    padding: 12px 24px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(90deg, var(--cyan), var(--violet));
    font-family: 'Orbitron';
}

</style>

</head>

<body>

<canvas id="bg-canvas"></canvas>

<section class="section">
    <div class="hero">
        <h1>AİLƏ KAİNATI</h1>
        <p>Scroll et və kainatda səyahətə başla</p>
    </div>
    <div class="scroll-text">SCROLL</div>
</section>

<section class="section">
    <div class="planet-title">Planet 1</div>
    <div class="planet-desc">Mavi planetə yaxınlaşırıq...</div>
</section>

<section class="section">
    <div class="planet-title">Planet 2</div>
    <div class="planet-desc">Yeni qalaktikaya keçid...</div>
</section>

<section class="section">
    <div class="planet-title">Qara Dəlik</div>
    <div class="planet-desc">Hadisələr üfüqünə daxil oluruq...</div>
</section>

<section class="orbit-screen">
    <div class="scene-wrap">
        <div class="orbit" id="orbit"></div>
    </div>
</section>

<div class="detail" id="detail">
    <div class="detail-card">
        <div class="avatar" id="avatar"></div>
        <h2 id="personName"></h2>
        <p id="personRole"></p>
        <button class="close">Bağla</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===============================
// THREE.JS SCENE
// ===============================

const canvas = document.getElementById("bg-canvas");

const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    alpha: true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    5000
);

camera.position.set(0, 0, 1200);

// ===============================
// LIGHTS
// ===============================

scene.add(new THREE.AmbientLight(0xffffff, .5));

const light = new THREE.PointLight(0xffffff, 2);

light.position.set(200, 200, 400);

scene.add(light);

// ===============================
// STARS
// ===============================

function createStars(count) {
    const geo = new THREE.BufferGeometry();
    const positions = [];

    for (let i = 0; i < count; i++) {
        positions.push(
            (Math.random() - .5) * 4000,
            (Math.random() - .5) * 4000,
            (Math.random() - .5) * 4000
        );
    }

    geo.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(positions, 3)
    );

    const mat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 2,
        transparent: true,
        opacity: .8
    });

    return new THREE.Points(geo, mat);
}

const stars = createStars(3000);

scene.add(stars);

// ===============================
// PLANET 1
// ===============================

const planet1 = new THREE.Mesh(
    new THREE.SphereGeometry(120, 64, 64),
    new THREE.MeshStandardMaterial({
        color: 0x22d3ee,
        emissive: 0x113355,
        roughness: .8
    })
);

planet1.position.set(-260, 40, -200);
scene.add(planet1);

const ring1 = new THREE.Mesh(
    new THREE.TorusGeometry(170, 5, 24, 200),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
);

ring1.rotation.x = Math.PI / 2;
planet1.add(ring1);

// ===============================
// PLANET 2
// ===============================

const planet2 = new THREE.Mesh(
    new THREE.SphereGeometry(90, 64, 64),
    new THREE.MeshStandardMaterial({
        color: 0xf472b6,
        emissive: 0x552244,
        roughness: .9
    })
);

planet2.position.set(300, -100, -650);
scene.add(planet2);

// ===============================
// BLACK HOLE
// ===============================

const blackHole = new THREE.Group();

const holeRing = new THREE.Mesh(
    new THREE.TorusGeometry(120, 30, 30, 200),
    new THREE.MeshBasicMaterial({ color: 0x8b5cf6 })
);

holeRing.rotation.x = Math.PI / 2;
blackHole.add(holeRing);

const core = new THREE.Mesh(
    new THREE.SphereGeometry(70, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
);

blackHole.add(core);

blackHole.position.set(0, 0, -1200);
scene.add(blackHole);

// ===============================
// RESIZE
// ===============================

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animasiya dövrü
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// =====================================
// AİLƏ MƏLUMATLARI
// =====================================

const family = [

["Nigar","Anam"],
["İlqar","Atam"],
["Kənan","Qardaşım"],
["Şükran","Bacım"],
["Sənan","Qardaşım"],

["Afət","Bibim"],
["Hökümə",""],
["Gülzar","Nənəm"],
["Sabir","Babam"],
["Əsli","Nənəm"],

["Məhəmməd","Babam"],
["Əkbər","Babam"],
["Yaqut","Nənəm"],

["Sayalı","Xalam"],
["Aynur","Xalam"],

["Süleyman","Dayım"],
["Ələkbər","Dayım"],

["Zəminə","Xalam D.D"],
["Aytən","Xalam D.D"],

["Nunuş","Xalam"],

["Emil","Dayım D.D"],

["Gülşən","Xalam Qızı"],
["Xəyal","Xalam Oğlu"],
["İslam","Xalam Oğlu"],

["Mələk","Dayım Qızı"],
["Fidan","Xalam Qızı"],
["Ayxan","Dayım Oğlu"]

];

// =====================================
// ORBIT
// =====================================

const orbit = document.getElementById("orbit");

const radius = 340;

family.forEach((person,index)=>{

const angle=(360/family.length)*index;

const card=document.createElement("div");

card.className="card";

card.style.transform=
`rotateY(${angle}deg)
 translateZ(${radius}px)`;

card.innerHTML=`

<div class="dot"></div>

<div class="name">

${person[0]}

</div>

<div class="rel">

${person[1]||"Ailə üzvü"}

</div>

`;

card.addEventListener("click",()=>{

openPerson(index);

});

orbit.appendChild(card);

});

// =====================================
// MODAL
// =====================================

const detail=document.getElementById("detail");

const avatar=document.getElementById("avatar");

const personName=document.getElementById("personName");

const personRole=document.getElementById("personRole");

const closeBtn=document.querySelector(".close");

let currentIndex=0;

function openPerson(index){

currentIndex=index;

avatar.innerHTML=

family[index][0].charAt(0);

personName.innerHTML=

family[index][0];

personRole.innerHTML=

family[index][1]||"Ailə üzvü";

detail.classList.add("show");

orbit.style.animationPlayState="paused";

}

function closeDetail(){

detail.classList.remove("show");

orbit.style.animationPlayState="running";

}

closeBtn.onclick=closeDetail;

detail.addEventListener("click",(e)=>{

if(e.target===detail){

closeDetail();

}

});

// =====================================
// ORBIT DRAG
// =====================================

let dragging=false;

let startX=0;

let rotateY=0;

window.addEventListener("pointerdown",(e)=>{

dragging=true;

startX=e.clientX;

orbit.style.animation="none";

});

window.addEventListener("pointerup",()=>{

dragging=false;

});

window.addEventListener("pointermove",(e)=>{

if(!dragging)return;

rotateY+=(e.clientX-startX)*0.25;

startX=e.clientX;

orbit.style.transform=

`rotateY(${rotateY}deg)`;

});

// =====================================
// KARTLARIN PARILTISI
// =====================================

setInterval(()=>{

document.querySelectorAll(".card")

.forEach((card,i)=>{

card.style.boxShadow=

`0 0 ${10+Math.random()*30}px

rgba(34,211,238,.35)`;

});

},800);
  
// =====================================
// SCROLL SƏYAHƏTİ
// Planet 1 -> Planet 2 -> Qara Dəlik -> Orbit
// =====================================

const sections=document.querySelectorAll(".section");

window.addEventListener("scroll",scrollJourney);

scrollJourney();

function scrollJourney(){

const maxScroll=

document.body.scrollHeight-

window.innerHeight;

const progress=

window.scrollY/maxScroll;

// ===================
// PLANET 1
// ===================

if(progress<0.25){

const t=progress/.25;

camera.position.x=

-250+(250*t);

camera.position.y=

40-(40*t);

camera.position.z=

1200-(700*t);

camera.lookAt(

planet1.position

);

}

// ===================
// PLANET 2
// ===================

else if(progress<0.50){

const t=(progress-.25)/.25;

camera.position.x=

0+(260*t);

camera.position.y=

0-(80*t);

camera.position.z=

500-(650*t);

camera.lookAt(

planet2.position

);

}

// ===================
// BLACK HOLE
// ===================

else if(progress<0.75){

const t=(progress-.50)/.25;

camera.position.x=

260-(260*t);

camera.position.y=

-80+(80*t);

camera.position.z=

-150-(950*t);

camera.lookAt(

blackHole.position

);

}

// ===================
// ORBIT
// ===================

else{

const t=(progress-.75)/.25;

camera.position.x=0;

camera.position.y=0;

camera.position.z=

-1100+

(1160*t);

camera.lookAt(

0,
0,
0

);

orbit.style.opacity=1;

}

}

// =====================================
// PLANET ANİMASİYASI
// =====================================

function animatePlanets(){

planet1.rotation.y+=0.002;

planet1.rotation.x+=0.0005;

planet2.rotation.y-=0.003;

planet2.rotation.z+=0.001;

ring1.rotation.z+=0.004;

holeRing.rotation.z+=0.05;

blackHole.rotation.y+=0.003;

}

// =====================================
// ULDUZLAR
// =====================================

function animateStars(){

stars.rotation.y+=0.00015;

stars.rotation.x+=0.00005;

}

// =====================================
// CAMERA SHAKE
// (Qara dəliyə yaxın)
// =====================================

function blackHoleShake(){

const maxScroll=

document.body.scrollHeight-

window.innerHeight;

const p=

window.scrollY/maxScroll;

if(

p>.55 &&

p<.74

){

camera.position.x+=

(Math.random()-.5)*2;

camera.position.y+=

(Math.random()-.5)*2;

}

}

// =====================================
// ORBIT FADE
// =====================================

function orbitFade(){

const maxScroll=

document.body.scrollHeight-

window.innerHeight;

const p=

window.scrollY/maxScroll;

if(p>.72){

orbit.style.opacity=

Math.min(

1,

(p-.72)/.12

);

}else{

orbit.style.opacity=0;

}

}

// =====================================
// PARALLAX
// =====================================

let mouseX=0;

let mouseY=0;

window.addEventListener("mousemove",(e)=>{

mouseX=

(e.clientX/

window.innerWidth-.5)*2;

mouseY=

(e.clientY/

window.innerHeight-.5)*2;

});

function cameraParallax(){

camera.position.x+=

(mouseX*10-camera.position.x)

*.02;

camera.position.y+=

(-mouseY*6-camera.position.y)

*.02;

}

  // =====================================
// MAIN ANIMATION LOOP
// =====================================

const clock = new THREE.Clock();

function animate(){

requestAnimationFrame(animate);

// Planetlər
animatePlanets();

// Ulduzlar
animateStars();

// Orbit görünməsi
orbitFade();

// Kamera titrəməsi
blackHoleShake();

// Mouse parallax
cameraParallax();

// Qara dəlik
holeRing.rotation.z += 0.01;

core.rotation.y += 0.02;

core.rotation.x += 0.01;

// Orbit yavaş fırlansın

orbit.style.transform += "";

// Render

renderer.render(scene,camera);

}

animate();

// =====================================
// SCROLL START
// =====================================

window.scrollTo({

top:0,

behavior:"instant"

});

// =====================================
// SCROLL END EFFECT
// =====================================

window.addEventListener("scroll",()=>{

const max=

document.body.scrollHeight-

window.innerHeight;

const p=

window.scrollY/max;

if(p>.97){

document.body.style.background=

"#000";

}

});

// =====================================
// DOUBLE CLICK
// Orbit mərkəzinə qayıt
// =====================================

window.addEventListener(

"dblclick",

()=>{

window.scrollTo({

top:

document.body.scrollHeight,

behavior:"smooth"

});

}

// =====================================
// FPS LIMIT
// =====================================

let fps=60;

let then=performance.now();

const interval=1000/fps;

function renderLoop(now){

requestAnimationFrame(renderLoop);

const delta=

now-then;

if(delta<interval)return;

then=

now-

(delta%interval);

renderer.render(

scene,

camera

);

}

requestAnimationFrame(

renderLoop

);

// =====================================
// INTRO
// =====================================

setTimeout(()=>{

document.querySelector(

".scroll-text"

).innerHTML=

"↓↓ Scroll ↓↓";

},1200);

// =====================================
// FINISHED
// =====================================

console.log(

"Ailə Kainatı hazırdır."

);
  
</script>

</body>
</html>
